name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobsense
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres" --health-interval=10s
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval=10s
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: |
          export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/jobsense"
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      - run: npm test
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/jobsense"
          REDIS_URL: "redis://localhost:6379"
          ANTHROPIC_API_KEY: dummy
          QSTASH_TOKEN: dummy
          QSTASH_CURRENT_SIGNING_KEY: dummy
          QSTASH_NEXT_SIGNING_KEY: dummy
          TWILIO_ACCOUNT_SID: dummy
          TWILIO_AUTH_TOKEN: dummy
          TWILIO_WHATSAPP_FROM: dummy
          YOUR_WHATSAPP_NUMBER: dummy
          GMAIL_USER: dummy
          GMAIL_APP_PASSWORD: dummy
          EMAIL_TO: dummy
          ARCJET_KEY: dummy
